services:
  imsda-registration:
    build:
      context: ./pwa-server
      dockerfile: Dockerfile
    container_name: imsda-registration
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file: ./pwa-server/.env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
